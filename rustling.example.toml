database_path = "rustling.db"
lookback_hours = 24
max_items_per_digest = 50

[email]
from = "digest@example.com"
to = ["you@example.com"]
subject_prefix = "Rustling Digest"

[llm]
provider = "claude"
endpoint = "https://api.anthropic.com/v1/messages"
model = "claude-sonnet-4-20250514"
